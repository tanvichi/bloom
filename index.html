<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloom — a visual programming language</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #faf9f6; color: #1a1a18; padding: 2rem; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .sub { font-size: 14px; color: #888780; margin-bottom: 1.5rem; }
  #toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }
  .color-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.15s; }
  .color-btn:hover { transform: scale(1.15); }
  .color-btn.selected { border-color: #1a1a18; }
  .ctrl-group { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #5F5E5A; }
  #garden { width: 100%; height: 400px; border-radius: 12px; border: 0.5px solid #d3d1c7; background: #f9f8f5; cursor: crosshair; display: block; position: relative; overflow: hidden; }
  #garden canvas { position: absolute; top: 0; left: 0; }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
  button { font-family: inherit; font-size: 13px; padding: 7px 16px; border-radius: 8px; border: 0.5px solid #b4b2a9; background: transparent; color: #1a1a18; cursor: pointer; }
  button:hover { background: #f1efe8; }
  button:active { transform: scale(0.98); }
  #play-btn { font-weight: 500; border-color: #7F77DD; color: #534AB7; }
  #status { font-size: 12px; color: #888780; margin-top: 8px; min-height: 16px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
  .leg-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #5F5E5A; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .label { font-size: 13px; color: #5F5E5A; font-weight: 500; }
</style>
</head>
<body>

<h1>Bloom</h1>
<p class="sub">A visual programming language. Every program is a flower.</p>

<div id="toolbar">
  <span class="label">Color:</span>
  <button class="color-btn selected" id="cb-purple" title="Purple — melody" style="background:#7F77DD;" onclick="setColor('purple','#7F77DD','#AFA9EC')"></button>
  <button class="color-btn" id="cb-teal" title="Teal — rhythm" style="background:#1D9E75;" onclick="setColor('teal','#1D9E75','#5DCAA5')"></button>
  <button class="color-btn" id="cb-coral" title="Coral — animation" style="background:#D85A30;" onclick="setColor('coral','#D85A30','#F0997B')"></button>
  <button class="color-btn" id="cb-amber" title="Amber — color shift" style="background:#EF9F27;" onclick="setColor('amber','#EF9F27','#FAC775')"></button>
  <button class="color-btn" id="cb-gray" title="Gray — silence" style="background:#888780;" onclick="setColor('gray','#888780','#B4B2A9')"></button>
  <div class="ctrl-group" style="margin-left:8px;">
    <label>Petals</label>
    <input type="range" min="3" max="10" value="5" id="petal-slider" step="1" style="width:70px;">
    <span id="petal-val" style="font-weight:500;min-width:14px;">5</span>
  </div>
  <div class="ctrl-group">
    <label>Size</label>
    <input type="range" min="20" max="60" value="36" id="size-slider" step="1" style="width:70px;">
    <span id="size-val" style="font-weight:500;min-width:14px;">36</span>
  </div>
</div>

<div id="garden">
  <canvas id="static-canvas"></canvas>
  <canvas id="anim-canvas"></canvas>
</div>

<div class="btn-row">
  <button id="play-btn" onclick="playGarden()">Play garden</button>
  <button onclick="stopGarden()">Stop</button>
  <button onclick="clearGarden()">Clear</button>
</div>
<div id="status">Click anywhere in the garden to plant a flower.</div>

<div class="legend">
  <div class="leg-item"><div class="leg-dot" style="background:#7F77DD;"></div>Purple — melody</div>
  <div class="leg-item"><div class="leg-dot" style="background:#1D9E75;"></div>Teal — rhythm</div>
  <div class="leg-item"><div class="leg-dot" style="background:#D85A30;"></div>Coral — animation</div>
  <div class="leg-item"><div class="leg-dot" style="background:#EF9F27;"></div>Amber — color shift</div>
  <div class="leg-item"><div class="leg-dot" style="background:#888780;"></div>Gray — silence / pause</div>
</div>

<script>
const garden = document.getElementById('garden');
const sCanvas = document.getElementById('static-canvas');
const aCanvas = document.getElementById('anim-canvas');
const sCtx = sCanvas.getContext('2d');
const aCtx = aCanvas.getContext('2d');

let flowers = [];
let currentColor = 'purple';
let currentFill = '#7F77DD';
let currentLight = '#AFA9EC';
let animFrame = null;
let audioCtx = null;
let playing = false;
let amberOn = false;
let amberHue = 0;

function resize() {
  const r = garden.getBoundingClientRect();
  sCanvas.width = aCanvas.width = r.width;
  sCanvas.height = aCanvas.height = r.height;
  redrawStatic();
}
window.addEventListener('resize', resize);
setTimeout(resize, 100);

document.getElementById('petal-slider').addEventListener('input', e => {
  document.getElementById('petal-val').textContent = e.target.value;
});
document.getElementById('size-slider').addEventListener('input', e => {
  document.getElementById('size-val').textContent = e.target.value;
});

function setColor(name, fill, light) {
  currentColor = name; currentFill = fill; currentLight = light;
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('cb-' + name).classList.add('selected');
}

garden.addEventListener('click', e => {
  const r = garden.getBoundingClientRect();
  const x = e.clientX - r.left;
  const y = e.clientY - r.top;
  const petals = parseInt(document.getElementById('petal-slider').value);
  const size = parseInt(document.getElementById('size-slider').value);
  flowers.push({ x, y, petals, size, color: currentColor, fill: currentFill, light: currentLight, phase: Math.random() * Math.PI * 2 });
  redrawStatic();
  setStatus('Flower planted — ' + flowers.length + ' flower' + (flowers.length !== 1 ? 's' : '') + ' in garden.');
});

function drawFlower(ctx, f, highlight, t) {
  const { x, y, petals, size, fill, light } = f;
  const stemH = size * 1.4;
  ctx.save();
  if (highlight && t !== undefined) {
    ctx.shadowColor = fill;
    ctx.shadowBlur = 12 * (0.85 + 0.15 * Math.sin(t * 6 + f.phase));
  }
  // stem
  ctx.strokeStyle = fill;
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x, y + size * 0.3);
  ctx.bezierCurveTo(x - size * 0.3, y + stemH * 0.5, x + size * 0.2, y + stemH * 0.7, x, y + stemH);
  ctx.stroke();
  // leaf
  if (petals > 4) {
    ctx.strokeStyle = light;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x, y + stemH * 0.6);
    ctx.bezierCurveTo(x - size * 0.5, y + stemH * 0.4, x - size * 0.7, y + stemH * 0.5, x - size * 0.5, y + stemH * 0.7);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  // petals
  for (let i = 0; i < petals; i++) {
    const angle = (i / petals) * Math.PI * 2 - Math.PI / 2;
    const wobble = highlight && t !== undefined ? 0.06 * Math.sin(t * 4 + f.phase + i) : 0;
    const px = x + Math.cos(angle + wobble) * size * 0.7;
    const py = y + Math.sin(angle + wobble) * size * 0.7;
    ctx.beginPath();
    ctx.ellipse((x + px) / 2, (y + py) / 2, size * 0.32, size * 0.18, angle, 0, Math.PI * 2);
    ctx.fillStyle = highlight ? light : light + 'cc';
    ctx.fill();
    ctx.strokeStyle = fill;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }
  // center
  ctx.beginPath();
  ctx.arc(x, y, size * 0.28, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x, y, size * 0.14, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.5;
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();
}

function redrawStatic() {
  sCtx.clearRect(0, 0, sCanvas.width, sCanvas.height);
  for (const f of flowers) drawFlower(sCtx, f, false);
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

const SCALES = {
  purple: [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25],
  teal:   [130.81, 146.83, 164.81, 196.00, 220.00, 246.94, 261.63, 293.66, 329.63, 392.00],
};

function playNote(freq, startTime, duration, gain, ac) {
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(gain, startTime + 0.04);
  g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(g).connect(ac.destination);
  osc.start(startTime);
  osc.stop(startTime + duration + 0.1);
}

function playDrum(type, startTime, ac) {
  if (type === 'kick') {
    const o = ac.createOscillator(), g = ac.createGain();
    o.frequency.setValueAtTime(160, startTime);
    o.frequency.exponentialRampToValueAtTime(40, startTime + 0.15);
    g.gain.setValueAtTime(0.8, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.2);
    o.connect(g).connect(ac.destination);
    o.start(startTime); o.stop(startTime + 0.3);
  } else {
    const buf = ac.createBuffer(1, ac.sampleRate * 0.08, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
    const src = ac.createBufferSource(), g = ac.createGain(), f = ac.createBiquadFilter();
    f.type = 'highpass'; f.frequency.value = 3000;
    src.buffer = buf;
    g.gain.setValueAtTime(0.4, startTime);
    g.gain.exponentialRampToValueAtTime(0.001, startTime + 0.08);
    src.connect(f).connect(g).connect(ac.destination);
    src.start(startTime);
  }
}

function playGarden() {
  if (flowers.length === 0) { setStatus('Plant some flowers first!'); return; }
  stopGarden();
  playing = true;
  const ac = getAudioCtx();
  const stepDur = 0.36;
  let t = ac.currentTime + 0.1;
  amberOn = flowers.some(f => f.color === 'amber');
  amberHue = 0;

  flowers.forEach((f, fi) => {
    const delay = fi * 0.12;
    if (f.color === 'purple') {
      const scale = SCALES.purple;
      for (let i = 0; i < f.petals; i++) {
        const freq = scale[i % scale.length] * (1 + (f.size - 36) / 200);
        playNote(freq, t + delay + i * stepDur, stepDur * 0.8, 0.22, ac);
      }
    } else if (f.color === 'teal') {
      for (let i = 0; i < f.petals; i++) {
        playDrum(i % 2 === 0 ? 'kick' : 'snare', t + delay + i * (stepDur * 0.6), ac);
      }
    }
    // coral = animation only, amber = visual only, gray = silence
  });

  const totalDur = Math.max(...flowers.map((f, fi) =>
    fi * 0.12 + f.petals * stepDur * (f.color === 'teal' ? 0.6 : 1) + stepDur
  ));

  setStatus('Playing ' + flowers.length + ' flower' + (flowers.length !== 1 ? 's' : '') + '...');
  startAnim(t, stepDur, totalDur, ac);
}

function startAnim(startAcTime, stepDur, totalDur, ac) {
  const startWall = performance.now();
  function frame() {
    if (!playing) { aCtx.clearRect(0, 0, aCanvas.width, aCanvas.height); return; }
    const elapsed = (performance.now() - startWall) / 1000;

    aCtx.clearRect(0, 0, aCanvas.width, aCanvas.height);

    if (amberOn) {
      amberHue = (amberHue + 0.5) % 360;
      aCtx.fillStyle = `hsla(${(amberHue + 30) % 360}, 70%, 85%, 0.08)`;
      aCtx.fillRect(0, 0, aCanvas.width, aCanvas.height);
    }

    flowers.forEach((f, fi) => {
      const delay = fi * 0.12;
      const localT = elapsed - delay;
      const stepLen = f.color === 'teal' ? stepDur * 0.6 : stepDur;
      const step = Math.floor(localT / stepLen);
      const inStep = localT >= 0 && step < f.petals;
      if (f.color === 'coral') {
        const r = f.size * (0.5 + 0.5 * Math.abs(Math.sin(elapsed * 2.5 + f.phase)));
        aCtx.save();
        aCtx.beginPath();
        aCtx.arc(f.x, f.y, r, 0, Math.PI * 2);
        aCtx.strokeStyle = f.fill;
        aCtx.lineWidth = 1.5;
        aCtx.globalAlpha = 0.35;
        aCtx.stroke();
        aCtx.restore();
      }
      drawFlower(aCtx, f, inStep, elapsed);
    });

    if (elapsed < totalDur + 0.5) {
      animFrame = requestAnimationFrame(frame);
    } else {
      playing = false;
      aCtx.clearRect(0, 0, aCanvas.width, aCanvas.height);
      setStatus('Done. Click Play to hear it again.');
    }
  }
  animFrame = requestAnimationFrame(frame);
}

function stopGarden() {
  playing = false;
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  aCtx.clearRect(0, 0, aCanvas.width, aCanvas.height);
  setStatus('Stopped.');
}

function clearGarden() {
  stopGarden();
  flowers = [];
  redrawStatic();
  setStatus('Garden cleared. Click to plant new flowers.');
}
</script>
</body>
</html>
